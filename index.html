<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submarine Crash Casino</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-root">
    <canvas id="scene-canvas" aria-label="Submarine game scene"></canvas>

    <div class="surface-waves"></div>
    <div class="depth-tint" id="depth-tint"></div>

    <header class="top-bar">
      <div class="brand">
        <h1>Submarine Crash</h1>
        <small id="phase-label">Waiting for next dive...</small>
      </div>
      <div class="bank">
        <span>Balance</span>
        <strong id="balance-display">$100.00</strong>
      </div>
    </header>

    <main class="hud">
      <section class="multiplier-panel">
        <div class="multiplier-label">Current Multiplier</div>
        <div id="multiplier-display" class="multiplier-value">1.00x</div>
        <div class="depth-row">
          <span>Depth</span>
          <div class="depth-meter">
            <div id="depth-meter-fill"></div>
          </div>
          <span id="depth-display">0 m</span>
        </div>
        <div class="round-meta">
          <span id="countdown-display">Next round in --</span>
          <span id="crash-display">Last crash: --</span>
        </div>
      </section>

      <section class="controls-panel">
        <div class="bet-input-group">
          <label for="bet-input">Bet Amount</label>
          <div class="bet-controls">
            <button data-bet-adjust="-1" class="adjust-btn" type="button">-</button>
            <input id="bet-input" type="number" min="0.01" step="0.01" value="1.00">
            <button data-bet-adjust="1" class="adjust-btn" type="button">+</button>
          </div>
          <div class="preset-row">
            <button class="preset-btn" data-preset="1" type="button">$1</button>
            <button class="preset-btn" data-preset="5" type="button">$5</button>
            <button class="preset-btn" data-preset="10" type="button">$10</button>
            <button class="preset-btn" data-preset="25" type="button">$25</button>
            <button class="preset-btn" data-preset="50" type="button">$50</button>
          </div>
        </div>

        <div class="action-buttons">
          <button id="bet-button" class="action-btn bet-btn" type="button">Place Bet</button>
          <button id="cashout-button" class="action-btn cashout-btn" type="button" disabled>Cash Out</button>
        </div>

        <div class="stake-info">
          <div><span>Current Bet</span><strong id="current-bet-display">$0.00</strong></div>
          <div><span>Potential Win</span><strong id="potential-win-display">$0.00</strong></div>
        </div>

        <div class="auto-cashout-row">
          <label class="toggle">
            <input id="auto-cashout-toggle" type="checkbox">
            <span>Auto Cash Out</span>
          </label>
          <input id="auto-cashout-input" type="number" min="1.01" step="0.01" value="2.00" disabled>
          <span>x</span>
        </div>
      </section>

      <aside class="history-panel">
        <h2>Crash History</h2>
        <ul id="history-list"></ul>
      </aside>
    </main>

    <footer class="fairness-bar">
      <div>Server Seed Hash: <code id="server-hash-display">--</code></div>
      <div>Round Nonce: <code id="nonce-display">0</code></div>
    </footer>
  </div>

  <script src="animations.js"></script>
  <script src="ui.js"></script>
  <script src="game.js"></script>
</body>
</html>
